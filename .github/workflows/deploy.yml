name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    env:
      PROJECT: '${{ github.event.repository.name }}'
      TAR_NAME: '${{ github.run_number }}.tar.gz'
      TAR_REMOTE_PATH: '~/release/tmp/${{ github.event.repository.name }}/deploy/${{ github.run_number }}.tar.gz'
      SHELL_DEST_PATH: '~/release/tmp/deploy_${{ github.run_number }}.sh'
      PUBLIC_DIR: '${{ secrets.PUBLIC_DIR }}'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.16"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build assets
        run: npm run build
      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SECRET_KEY }}
          name: id_rsa-target
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
          config: |
            Host target
              HostName ${{ secrets.SSH_HOST }}
              User ${{ secrets.SSH_USER }}
              Port ${{ secrets.SSH_PORT }}
              StrictHostKeyChecking yes
              IdentityFile ~/.ssh/id_rsa-target
      - name: Transfer modules
        run: |
          ssh target "mkdir -p ~/release/tmp/${PROJECT}/deploy"
          tar czf ~/${TAR_NAME} bin/ config/ plugins/ resources/ src/ templates/ webroot/ composer.json composer.lock
          scp ~/${TAR_NAME} target:${TAR_REMOTE_PATH}
          scp ./scripts/deploy.sh target:${SHELL_DEST_PATH}
      - name: Deploy modules
        run: ssh target "${SHELL_DEST_PATH} ${TAR_REMOTE_PATH} ${PROJECT} ${PUBLIC_DIR} && rm -f ${SHELL_DEST_PATH}"

  notify:
    if: ${{ always() && (needs.deploy.result == 'success' || needs.deploy.result == 'failure') }}
    needs:
      - deploy
    runs-on: ubuntu-latest
    steps:
      - name: Notify to Slack
        uses: slackapi/slack-github-action@v3.0.3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "${{ needs.deploy.result == 'success' && ':white_check_mark: Deploy succeeded' || ':x: Deploy failed' }}"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "${{ needs.deploy.result == 'success' && ':white_check_mark: *Deploy succeeded*' || ':x: *Deploy failed*' }}"
              - type: section
                fields:
                  - type: mrkdwn
                    text: "*Repository:*\n<${{ github.server_url }}/${{ github.repository }}|${{ github.repository }}>"
              - type: actions
                elements:
                  - type: button
                    text:
                      type: plain_text
                      text: View workflow
                    url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    action_id: view_workflow
